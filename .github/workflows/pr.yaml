name: Pull Request
"on":
  workflow_dispatch: null
  pull_request: null
jobs:
  pr-generate-linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4.2.2
    - name: Download OpenSSL source
      run: |
        curl -fL -o /tmp/openssl.tar.gz https://github.com/openssl/openssl/releases/download/openssl-3.5.5/openssl-3.5.5.tar.gz
        tar xzf /tmp/openssl.tar.gz -C /tmp
    - name: Checkout BCR
      uses: actions/checkout@v4.2.2
      with:
        repository: illicitonion/bazel-central-registry
        path: bazel-central-registry
        ref: refs/heads/main
    - run: git config --global user.email "github@raccoons.build" && git config --global user.name "Raccoons Build"
    - run: (cd bazel-central-registry && git remote add upstream https://github.com/bazelbuild/bazel-central-registry.git && git fetch upstream && git reset --hard upstream/main)
    - run: >
        bazel run //:generate --
        --openssl_source_dir=/tmp/openssl-3.5.5
        --output_dir=/tmp/overlay
        --pregen_dir=/tmp/pregen
        --bcr_dir=$(pwd)/bazel-central-registry
        --tag=3.5.5.bcr.wip
        --source_archive=/tmp/openssl.tar.gz
    - run: tar czf /tmp/core-pregen.tar.gz -C /tmp pregen
    - name: Upload core pregen
      uses: actions/upload-artifact@v4
      with:
        name: core-pregen
        path: /tmp/core-pregen.tar.gz
        if-no-files-found: error
    - run: tar czf bcr-core.tar.gz bazel-central-registry
    - name: Upload core BCR
      uses: actions/upload-artifact@v4
      with:
        name: bcr-core
        path: bcr-core.tar.gz
        if-no-files-found: error

  pr-generate-macos:
    runs-on: macos-14
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4.2.2
    - name: Download OpenSSL source
      run: |
        curl -fL -o /tmp/openssl.tar.gz https://github.com/openssl/openssl/releases/download/openssl-3.5.5/openssl-3.5.5.tar.gz
        tar xzf /tmp/openssl.tar.gz -C /tmp
    - run: >
        python3 generate_constants.py
        --openssl_source_dir=/tmp/openssl-3.5.5
        --output_dir=/tmp/macos-asm
        --perlasm-only=macosx,ios64
    - run: tar czf /tmp/macos-asm.tar.gz -C /tmp/macos-asm/generated/asm .
    - name: Upload macOS ASM
      uses: actions/upload-artifact@v4
      with:
        name: macos-asm
        path: /tmp/macos-asm.tar.gz
        if-no-files-found: error

  pr-generate-merge:
    runs-on: ubuntu-latest
    needs:
      - pr-generate-linux
      - pr-generate-macos
    steps:
      - name: Download core pregen
        uses: actions/download-artifact@v4
        with:
          name: core-pregen
          path: /tmp/
      - run: (cd /tmp && tar xzf core-pregen.tar.gz)
      - name: Download macOS ASM
        uses: actions/download-artifact@v4
        with:
          name: macos-asm
          path: /tmp/
      - name: Overlay macOS ASM into pregen
        run: |
          rm -rf /tmp/pregen/generated/asm/macosx /tmp/pregen/generated/asm/ios64
          mkdir -p /tmp/pregen/generated/asm
          tar xzf /tmp/macos-asm.tar.gz -C /tmp/pregen/generated/asm
      - name: Download core BCR
        uses: actions/download-artifact@v4
        with:
          name: bcr-core
          path: /tmp/
      - run: tar xzf /tmp/bcr-core.tar.gz
      - name: Checkout repo for scripts
        uses: actions/checkout@v4.2.2
        with:
          path: repo
      - name: Create pregen tarball and patch BCR
        run: |
          tar czf /tmp/pregen.tar.gz -C /tmp pregen
          python3 repo/patch_bcr_pregen.py \
            --tarball=/tmp/pregen.tar.gz \
            --bcr_dir=bazel-central-registry \
            --tag=3.5.5.bcr.wip \
            --url_override=file:///tmp/pregen.tar.gz
      - run: tar czf bcr.tar.gz bazel-central-registry
      - name: Upload merged BCR
        uses: actions/upload-artifact@v4
        with:
          name: bcr.tar.gz
          path: bcr.tar.gz
          if-no-files-found: error
      - name: Upload pregen tarball
        uses: actions/upload-artifact@v4
        with:
          name: pregen.tar.gz
          path: /tmp/pregen.tar.gz
          if-no-files-found: error

  pr-test-unix:
    name: pr-test-${{ matrix.os }} bazel-${{ matrix.bazel }} (pregen=${{ matrix.use_pregenerated }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-latest
          - ubuntu-24.04-arm
        bazel:
          - 7.x
          - 8.x
          - 9.x
        # Exercise both pre-generated file routing (default) and Perl genrule fallback.
        use_pregenerated:
          - true
          - false
    needs:
      - pr-generate-merge
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download bcr
        uses: actions/download-artifact@v4
        with:
          name: bcr.tar.gz
          path: /tmp/
      - name: Download pregen tarball
        uses: actions/download-artifact@v4
        with:
          name: pregen.tar.gz
          path: /tmp/
      - run: (cd /tmp && tar xzf /tmp/bcr.tar.gz)
      - run:
          mkdir workspace &&
          cd workspace &&
          echo ${{ matrix.bazel }} > .bazelversion &&
          echo 'bazel_dep(name = "openssl", version = "3.5.5.bcr.wip")' > MODULE.bazel &&
          echo 'bazel_dep(name = "rules_java", version = "9.1.0", dev_dependency = True)' >> MODULE.bazel &&
          echo 'bazel_dep(name = "rules_cc", version = "0.2.17", dev_dependency = True)' >> MODULE.bazel
      - run:
          cd workspace &&
          bazel cquery ${{ matrix.use_pregenerated == false && '"--@openssl//:use-pregenerated=False" ' || '' }}--registry="file:///tmp/bazel-central-registry" @openssl//... --output=build
      - run:
          cd workspace &&
          bazel test ${{ matrix.use_pregenerated == false && '"--@openssl//:use-pregenerated=False" ' || '' }}--verbose_failures --registry="file:///tmp/bazel-central-registry" @openssl//...
  pr-test-windows:
    name: pr-test-windows bazel-${{ matrix.bazel }} (pregen=${{ matrix.use_pregenerated }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        bazel:
          - 7.x
          - 8.x
          - 9.x
        use_pregenerated:
          - true
          - false
    needs:
      - pr-generate-merge
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download msys tools
        uses: msys2/setup-msys2@v2
      - name: Download bcr
        uses: actions/download-artifact@v4
        with:
          name: bcr.tar.gz
          path: C:\
      - name: Download pregen tarball
        uses: actions/download-artifact@v4
        with:
          name: pregen.tar.gz
          path: C:\
      - name: Setup nasm
        uses: ilammy/setup-nasm@v1
      - run: (cd C:\ && tar xzf C:\bcr.tar.gz)
      - name: Patch MODULE.bazel paths for Windows
        shell: pwsh
        run: |
         Get-ChildItem -Recurse -Filter 'MODULE.bazel' -Path 'C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip' | ForEach-Object {
              $content = Get-Content $_.FullName
              $newContent = $content -replace 'file:///tmp/', 'file:///C:/'
              Set-Content $_.FullName -Value $newContent
          }
      - name: Update hash in source.json
        run: jq --arg HASH "$(pwsh -c '$hash = Get-FileHash -Algorithm SHA256 C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\MODULE.bazel | Select-Object Hash ; [System.Convert]::ToBase64String([System.Convert]::FromHexString($hash.Hash))')" '.overlay["MODULE.bazel"] = "sha256-\($HASH)"' C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json > C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json.modified && rm C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json && mv C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json.modified C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json
      - run:
          mkdir workspace &&
          cd workspace &&
          echo ${{ matrix.bazel }} > .bazelversion &&
          echo 'bazel_dep(name = "openssl", version = "3.5.5.bcr.wip")' > MODULE.bazel &&
          echo 'bazel_dep(name = "rules_java", version = "9.1.0", dev_dependency = True)' >> MODULE.bazel &&
          echo 'bazel_dep(name = "rules_cc", version = "0.2.17", dev_dependency = True)' >> MODULE.bazel
      - run:
          cd workspace &&
          bazel cquery ${{ matrix.use_pregenerated == false && '"--@openssl//:use-pregenerated=False" ' || '' }}--registry="file:///C:/bazel-central-registry" @openssl//... --output=build
      - run:
          cd workspace &&
          bazel test ${{ matrix.use_pregenerated == false && '"--@openssl//:use-pregenerated=False" ' || '' }}--verbose_failures --registry="file:///C:/bazel-central-registry" @openssl//...

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1
