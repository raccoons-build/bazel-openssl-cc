name: Pull Request
"on":
  workflow_dispatch: null
  pull_request: null
jobs:
  pr-generate-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4.2.2
    - name: Download OpenSSL source
      run: |
        curl -fL -o /tmp/openssl.tar.gz https://github.com/openssl/openssl/releases/download/openssl-3.5.5/openssl-3.5.5.tar.gz
        tar xzf /tmp/openssl.tar.gz -C /tmp
    - name: Checkout BCR
      uses: actions/checkout@v4.2.2
      with:
        repository: illicitonion/bazel-central-registry
        path: bazel-central-registry
        ref: refs/heads/main
    - run: git config --global user.email "github@raccoons.build" && git config --global user.name "Raccoons Build"
    - run: (cd bazel-central-registry && git remote add upstream https://github.com/bazelbuild/bazel-central-registry.git && git fetch upstream && git reset --hard upstream/main)
    - run: >
        bazel run //:generate --
        --openssl_source_dir=/tmp/openssl-3.5.5
        --output_dir=/tmp/overlay
        --bcr_dir=$(pwd)/bazel-central-registry
        --tag=3.5.5.bcr.wip
        --source_archive=/tmp/openssl.tar.gz
    - run: tar czf /tmp/core-overlay.tar.gz -C /tmp overlay
    - name: Upload core overlay
      uses: actions/upload-artifact@v4
      with:
        name: core-overlay
        path: /tmp/core-overlay.tar.gz
        if-no-files-found: error
    - run: tar czf bcr-core.tar.gz bazel-central-registry
    - name: Upload core BCR
      uses: actions/upload-artifact@v4
      with:
        name: bcr-core
        path: bcr-core.tar.gz
        if-no-files-found: error

  pr-generate-macos:
    runs-on: macos-14
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4.2.2
    - name: Download OpenSSL source
      run: |
        curl -fL -o /tmp/openssl.tar.gz https://github.com/openssl/openssl/releases/download/openssl-3.5.5/openssl-3.5.5.tar.gz
        tar xzf /tmp/openssl.tar.gz -C /tmp
    - run: >
        python3 generate_constants.py
        --openssl_source_dir=/tmp/openssl-3.5.5
        --output_dir=/tmp/macos-asm
        --perlasm-only=macosx,ios64
    - run: tar czf /tmp/macos-asm.tar.gz -C /tmp/macos-asm/generated/asm .
    - name: Upload macOS ASM
      uses: actions/upload-artifact@v4
      with:
        name: macos-asm
        path: /tmp/macos-asm.tar.gz
        if-no-files-found: error

  pr-generate-merge:
    runs-on: ubuntu-latest
    needs:
      - pr-generate-linux
      - pr-generate-macos
    steps:
      - name: Download core overlay
        uses: actions/download-artifact@v4
        with:
          name: core-overlay
          path: /tmp/
      - run: (cd /tmp && tar xzf core-overlay.tar.gz)
      - name: Download macOS ASM
        uses: actions/download-artifact@v4
        with:
          name: macos-asm
          path: /tmp/
      - name: Overlay macOS ASM
        run: |
          rm -rf /tmp/overlay/generated/asm/macosx /tmp/overlay/generated/asm/ios64
          mkdir -p /tmp/overlay/generated/asm
          tar xzf /tmp/macos-asm.tar.gz -C /tmp/overlay/generated/asm
      - name: Download core BCR
        uses: actions/download-artifact@v4
        with:
          name: bcr-core
          path: /tmp/
      - run: tar xzf /tmp/bcr-core.tar.gz
      - name: Update BCR overlay with merged files
        run: |
          BCR_OVERLAY=bazel-central-registry/modules/openssl/3.5.5.bcr.wip/overlay
          rm -rf "$BCR_OVERLAY/generated/asm"
          cp -r /tmp/overlay/generated/asm "$BCR_OVERLAY/generated/asm"
          cd bazel-central-registry
          python3 -c "
          import hashlib, base64, json, os
          overlay_dir = 'modules/openssl/3.5.5.bcr.wip/overlay'
          source_json_path = 'modules/openssl/3.5.5.bcr.wip/source.json'
          with open(source_json_path) as f:
              sj = json.load(f)
          for root, _, files in os.walk(overlay_dir):
              for fn in files:
                  full = os.path.join(root, fn)
                  rel = os.path.relpath(full, overlay_dir)
                  with open(full, 'rb') as fh:
                      digest = hashlib.sha256(fh.read()).digest()
                  sj['overlay'][rel] = 'sha256-' + base64.b64encode(digest).decode()
          with open(source_json_path, 'w') as f:
              json.dump(sj, f, indent='    ', sort_keys=True)
              f.write('\n')
          "
      - run: tar czf bcr.tar.gz bazel-central-registry
      - name: Upload merged BCR
        uses: actions/upload-artifact@v4
        with:
          name: bcr.tar.gz
          path: bcr.tar.gz
          if-no-files-found: error

  pr-test-unix:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-latest
          - ubuntu-24.04-arm
        bazel:
          - 7.x
          - 8.x
          - 9.x
          - rolling
    needs:
      - pr-generate-merge
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download bcr
        uses: actions/download-artifact@v4
        with:
          name: bcr.tar.gz
          path: /tmp/
      - run: (cd /tmp && tar xzf /tmp/bcr.tar.gz)
      - run:
          mkdir workspace &&
          cd workspace &&
          echo ${{ matrix.bazel }} > .bazelversion &&
          echo 'bazel_dep(name = "openssl", version = "3.5.5.bcr.wip")' > MODULE.bazel &&
          echo 'bazel_dep(name = "rules_java", version = "9.1.0", dev_dependency = True)' >> MODULE.bazel &&
          echo 'bazel_dep(name = "rules_cc", version = "0.2.17", dev_dependency = True)' >> MODULE.bazel
      - run:
          cd workspace &&
          bazel cquery --registry="file:///tmp/bazel-central-registry" @openssl//... --output=build
      - run:
          cd workspace &&
          bazel test --verbose_failures --registry="file:///tmp/bazel-central-registry" @openssl//...
  pr-test-windows:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        bazel:
          - 7.x
          - 8.x
          - 9.x
          - rolling
    needs:
      - pr-generate-merge
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download msys tools
        uses: msys2/setup-msys2@v2
      - name: Download bcr
        uses: actions/download-artifact@v4
        with:
          name: bcr.tar.gz
          path: C:\
      - name: Setup nasm
        uses: ilammy/setup-nasm@v1
      - run: (cd C:\ && tar xzf C:\bcr.tar.gz)
      - name: Modify MODULE.bazel files
        shell: pwsh
        run: |
         Get-ChildItem -Recurse -Filter 'MODULE.bazel' -Path 'C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip' | ForEach-Object {
              $content = Get-Content $_.FullName
              $newContent = $content -replace 'file:///tmp/', 'file:///C:/'
              Set-Content $_.FullName -Value $newContent
          }
      - name: Update hash in source.json
        run: jq --arg HASH "$(pwsh -c '$hash = Get-FileHash -Algorithm SHA256 C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\MODULE.bazel | Select-Object Hash ; [System.Convert]::ToBase64String([System.Convert]::FromHexString($hash.Hash))')" '.overlay["MODULE.bazel"] = "sha256-\($HASH)"' C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json > C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json.modified && rm C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json && mv C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json.modified C:\bazel-central-registry\modules\openssl\3.5.5.bcr.wip\source.json
      - run:
          mkdir workspace &&
          cd workspace &&
          echo ${{ matrix.bazel }} > .bazelversion &&
          echo 'bazel_dep(name = "openssl", version = "3.5.5.bcr.wip")' > MODULE.bazel &&
          echo 'bazel_dep(name = "rules_java", version = "9.1.0", dev_dependency = True)' >> MODULE.bazel &&
          echo 'bazel_dep(name = "rules_cc", version = "0.2.17", dev_dependency = True)' >> MODULE.bazel
      - run:
          cd workspace &&
          bazel cquery --registry="file:///C:/bazel-central-registry" @openssl//... --output=build
      - run:
          cd workspace &&
          bazel test --verbose_failures --registry="file:///C:/bazel-central-registry" @openssl//...

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1
